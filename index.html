    function deepClone(obj){return JSON.parse(JSON.stringify(obj));}
    function loadTripDays(){try{return JSON.parse(localStorage.getItem('trip_days_fixed_v1'))||deepClone(defaultTripDays);}catch(e){return deepClone(defaultTripDays);}}
    let tripDays=loadTripDays();
    if(!Array.isArray(tripDays)||tripDays.length<10){tripDays=deepClone(defaultTripDays);}
    const saveTripDays=()=>localStorage.setItem('trip_days_fixed_v1', JSON.stringify(tripDays));
    const cityOptions=["All","佛羅倫斯","西恩那","威尼斯","米蘭","科莫湖","Transit"];
    const cityColor={佛羅倫斯:"#fff1f2",西恩那:"#fffbeb",威尼斯:"#ecfeff",米蘭:"#f8fafc",科莫湖:"#ecfdf5",Transit:"#f5f3ff"};
    let selectedCity='All',openDay=tripDays[0]?.id||2,compactMode=false;
    const cityChipsEl=document.getElementById('cityChips'); const dayListEl=document.getElementById('dayList'); const dayCardEl=document.getElementById('dayCard'); const modeBtn=document.getElementById('modeBtn'); const topBtn=document.getElementById('topBtn'); const todayBtn=document.getElementById('todayBtn');
    const getFilteredDays=()=>selectedCity==='All'?tripDays:tripDays.filter(d=>d.city===selectedCity);
    const getCurrentDay=()=>{const filtered=getFilteredDays(); return filtered.find(d=>d.id===openDay)||filtered[0]||tripDays[0];};
    const areaFlow=(area)=>{const parts=area.split('→').map(s=>s.trim()).filter(Boolean); return `<div class="area-flow">${parts.map((part,i)=>`<div class="area-node">${part}</div>${i<parts.length-1?'<div class="arrow">→</div>':''}`).join('')}</div>`;};
    const foodCard=(item)=>`<a class="food-card" href="https://www.google.com/maps/search/${encodeURIComponent(item.map||item.name)}" target="_blank" rel="noreferrer"><div class="item-name">${item.name}</div><div class="food-note"><strong>推薦品項：</strong>${item.recommend||'店內招牌'}</div><div class="food-note"><strong>價位：</strong>${item.price||'€€'}</div><div class="tag">${item.type||'店家'}</div></a>`;
    const simpleLinkCard=(title,map)=>`<a class="link-card" href="https://www.google.com/maps/search/${encodeURIComponent(map)}" target="_blank" rel="noreferrer"><div class="item-name">${title}</div><div class="tag">Google Maps</div></a>`;
    const markDone=(id)=>{const done=JSON.parse(localStorage.getItem('trip_done_fixed_v1')||'{}'); done[id]=!done[id]; localStorage.setItem('trip_done_fixed_v1', JSON.stringify(done)); renderAll();};
    const isDone=(id)=>{const done=JSON.parse(localStorage.getItem('trip_done_fixed_v1')||'{}'); return !!done[id];};
    const buildDayMapUrl=(day)=>{const points=day.schedule.map(s=>s.map||s.label).filter(Boolean); if(!points.length) return `https://www.google.com/maps/search/${encodeURIComponent(day.mapQuery)}`; const destination=points[points.length-1]; const waypoints=points.slice(0,-1).join('|'); return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(destination)}&waypoints=${encodeURIComponent(waypoints)}&travelmode=walking`;};
    function moveToDay(fromDayId,index,toDayId){const from=tripDays.find(d=>d.id===fromDayId); const to=tripDays.find(d=>d.id===Number(toDayId)); if(!from||!to||from===to) return; const [item]=from.schedule.splice(index,1); to.schedule.push(item); saveTripDays(); renderAll();}
    function deleteItem(dayId,index){const day=tripDays.find(d=>d.id===dayId); if(!day) return; day.schedule.splice(index,1); saveTripDays(); renderAll();}
    function toggleBooking(dayId,index,field){const day=tripDays.find(d=>d.id===dayId); if(!day||!day.schedule[index]) return; day.schedule[index][field]=!day.schedule[index][field]; saveTripDays(); renderAll();}
    function updatePhotoText(dayId,idx,val){const day=tripDays.find(d=>d.id===dayId); if(!day||!day.photos?.[idx]) return; day.photos[idx].caption=val; saveTripDays();}
    function deletePhoto(dayId,idx){const day=tripDays.find(d=>d.id===dayId); if(!day||!day.photos) return; day.photos.splice(idx,1); saveTripDays(); renderAll();}
    function addPhoto(dayId,file){const day=tripDays.find(d=>d.id===dayId); if(!day||!file) return; const reader=new FileReader(); reader.onload=()=>{day.photos=day.photos||[]; day.photos.push({src:reader.result,caption:''}); saveTripDays(); renderAll();}; reader.readAsDataURL(file);}
    async function fetchWeather(){try{const res=await fetch('https://api.open-meteo.com/v1/forecast?latitude=45.46&longitude=9.19&current_weather=true'); const data=await res.json(); const temp=data?.current_weather?.temperature; if(typeof temp==='number') document.querySelectorAll('.weather-temp').forEach(el=>el.textContent=`${temp}°C`);}catch(e){}}
    function renderChips(){cityChipsEl.innerHTML=cityOptions.map(city=>`<button class="chip ${selectedCity===city?'active':''}" data-city="${city}">${city==='All'?'全部':city}</button>`).join(''); cityChipsEl.querySelectorAll('.chip').forEach(btn=>btn.addEventListener('click',()=>{selectedCity=btn.dataset.city; const filtered=getFilteredDays(); if(!filtered.some(d=>d.id===openDay)) openDay=filtered[0]?.id||tripDays[0].id; renderAll();}));}
    function renderDayList(){const filtered=getFilteredDays(); dayListEl.innerHTML=filtered.map(day=>`<button class="day-btn ${day.id===openDay?'active':''}" data-id="${day.id}"><div class="day-date">${day.date}</div><div class="day-title">${day.title}</div><div class="day-area">${day.area}</div></button>`).join(''); dayListEl.querySelectorAll('.day-btn').forEach(btn=>btn.addEventListener('click',()=>{openDay=Number(btn.dataset.id); renderAll(); setTimeout(()=>document.getElementById('todaySchedule')?.scrollIntoView({behavior:'smooth',block:'start'}),60);}));}
    function wireSwipeAndDrag(dayId){
      const list=document.getElementById('todaySchedule'); if(!list) return; let dragIndex=null;
      list.querySelectorAll('.swipe-card').forEach(card=>{
        let startX=0;
        card.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;},{passive:true});
        card.addEventListener('touchmove',e=>{const diff=e.touches[0].clientX-startX; if(diff<-58) card.style.transform='translateX(-92px)'; if(diff>24) card.style.transform='translateX(0)'; if(diff<-120){const idx=Number(card.dataset.index); deleteItem(dayId,idx);}}, {passive:true});
        card.addEventListener('touchend',()=>{if(card.style.transform!=='translateX(-92px)') card.style.transform='translateX(0)';});
        card.addEventListener('dragstart',()=>{dragIndex=Number(card.dataset.index); card.classList.add('dragging');});
        card.addEventListener('dragend',()=>{card.classList.remove('dragging'); dragIndex=null;});
        card.addEventListener('dragover',e=>e.preventDefault());
        card.addEventListener('drop',e=>{e.preventDefault(); const targetIndex=Number(card.dataset.index); if(dragIndex===null||dragIndex===targetIndex) return; const day=tripDays.find(d=>d.id===dayId); const [moved]=day.schedule.splice(dragIndex,1); day.schedule.splice(targetIndex,0,moved); saveTripDays(); renderAll();});
      });
    }
    function getProgress(day){const total=day.schedule.length||1; let doneCount=0; day.schedule.forEach((_,i)=>{if(isDone(`${day.id}_${i}`)) doneCount++;}); return {doneCount,total,pct:Math.round(doneCount/total*100)};}
    function renderDayCard(){const day=getCurrentDay(); const cityFood=cityRestaurants[day.city]||[]; const visibleSchedule=compactMode?day.schedule.filter((item,index)=>index<5||String(item.time).includes(':')):day.schedule; const foodList=cityFood.filter(x=>!["Gelato","咖啡","烘焙","甜點"].includes(x[1])).map(([name,type,map,recommend,price])=>({name,type,map,recommend,price})); const dessertList=cityFood.filter(x=>["Gelato","咖啡","烘焙","甜點"].includes(x[1])).map(([name,type,map,recommend,price])=>({name,type,map,recommend,price})); const restrooms=cityRestrooms[day.city]||cityRestrooms.Transit||[]; const supermarkets=citySupermarkets[day.city]||citySupermarkets.Transit||[]; const progress=getProgress(day);
      dayCardEl.innerHTML=`<div class="day-head"><div class="eyebrow">${day.date}</div><h3>${day.title}</h3><div class="summary">${day.summary}</div><div class="badges"><span class="badge" style="background:${cityColor[day.city]||'#fafaf9'}">${day.city}</span><span class="badge">${day.area}</span></div></div><div class="content-grid"><div><div class="section-title">今日進度</div><div class="progress-card"><div class="label">已完成 ${progress.doneCount} / ${progress.total}</div><div class="value">${progress.pct}%</div><div class="progress-bar"><div class="progress-fill" style="width:${progress.pct}%"></div></div></div><div style="margin-top:16px" class="section-title">今日行程</div><div class="stack" id="todaySchedule">${visibleSchedule.map((item,i)=>{const key=`${day.id}_${i}`; return `<div class="item-shell"><div class="delete-lane">刪除</div><div class="swipe-card ${isDone(key)?'done':''}" draggable="true" data-index="${i}"><div class="item-top"><div class="item-name"><span class="drag-handle">☰</span><input type="checkbox" ${isDone(key)?'checked':''} onchange="markDone('${key}')" style="margin-right:6px">${item.label}</div><div class="item-time">${item.time}</div></div><div class="item-note">${item.note||''}</div><div class="mini"><strong>建議移動方式：</strong>${item.move||'步行'}｜${item.moveNote||''}</div><div class="ticket-box"><label><input type="checkbox" ${item.ticket?'checked':''} onchange="toggleBooking(${day.id},${i},'ticket')"> 已訂票</label><label><input type="checkbox" ${item.reservation?'checked':''} onchange="toggleBooking(${day.id},${i},'reservation')"> 已訂位</label></div><div class="map-actions"><a href="https://www.google.com/maps/search/${encodeURIComponent(item.map||item.label)}" target="_blank" class="tag">點此導航</a></div><div class="move-row"><select class="move-select" onchange="moveToDay(${day.id},${i}, this.value)"><option value="">移到其他天</option>${tripDays.filter(d=>d.id!==day.id).map(d=>`<option value="${d.id}">${d.date} ${d.title}</option>`).join('')}</select><span class="mini">長按 ☰ 可拖曳排序</span></div></div></div>`;}).join('')}</div>${day.museumNotes?.length?`<div style="margin-top:16px"><div class="section-title">展間 / 觀賞重點</div><div class="stack">${day.museumNotes.map(box=>`<div class="museum-box"><div class="item-name">${box.title}</div><ul>${box.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`).join('')}</div></div>`:''}<div style="margin-top:16px"><div class="section-title">附近可吃的餐廳</div><div class="stack">${[...foodList,...dessertList].map(foodCard).join('')}</div></div><div style="margin-top:16px"><div class="section-title">住宿</div>${simpleLinkCard(day.stay?.[0]||'住宿',day.stay?.[1]||day.mapQuery)}</div><div style="margin-top:16px"><div class="section-title">主要活動區域 / 今日地圖</div><a class="link-card" href="${buildDayMapUrl(day)}" target="_blank" rel="noreferrer">${areaFlow(day.area)}<div class="tag">Google Maps 路線</div></a></div><div style="margin-top:16px"><div class="section-title">天氣 / 日出日落</div><div class="grid2"><div class="weather-card"><div class="label">目前氣溫</div><div class="value weather-temp">${day.weather.temp}</div></div><div class="weather-card"><div class="label">降雨</div><div class="value">${day.weather.rain}</div></div><div class="weather-card"><div class="label">日出</div><div class="value">${day.weather.sunrise}</div></div><div class="weather-card"><div class="label">日落</div><div class="value">${day.weather.sunset}</div></div></div></div><div style="margin-top:16px"><div class="section-title">今日新的 / 今日照片</div><div class="stack"><div class="photo-card"><div class="upload-row"><input type="file" accept="image/*" onchange="addPhoto(${day.id}, this.files[0])"></div></div>${(day.photos||[]).map((p,idx)=>`<div class="photo-card"><img class="photo-preview" src="${p.src}" alt="photo ${idx+1}"><textarea class="budget-input" style="margin-top:10px;min-height:90px;resize:vertical" placeholder="為這張照片加上文字說明" oninput="updatePhotoText(${day.id},${idx},this.value)">${p.caption||''}</textarea><div class="map-actions" style="margin-top:10px"><button class="danger-btn small-btn" onclick="deletePhoto(${day.id},${idx})">刪除照片</button></div></div>`).join('')}</div></div></div><div><div class="section-title">廁所據點</div><div class="stack">${restrooms.map(([name,map])=>simpleLinkCard(name,map)).join('')}</div><div style="margin-top:16px"><div class="section-title">超市</div><div class="stack">${supermarkets.map(([name,map])=>simpleLinkCard(name,map)).join('')}</div></div><div style="margin-top:16px"><div class="section-title">小提醒</div><div class="stack">${(day.tips||[]).map(t=>`<div class="link-card">${t}</div>`).join('')}</div></div></div></div>`;
      wireSwipeAndDrag(day.id);
    }
    function renderAll(){renderChips(); renderDayList(); renderDayCard(); modeBtn.textContent=compactMode?'目前：精簡模式':'目前：完整模式'; fetchWeather();}
    modeBtn.addEventListener('click',()=>{compactMode=!compactMode; renderAll();});
    window.addEventListener('scroll',()=>{topBtn.classList.toggle('show', window.scrollY>300); todayBtn.classList.toggle('show', window.scrollY>300);});
    topBtn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
    todayBtn.addEventListener('click',()=>document.getElementById('todaySchedule')?.scrollIntoView({behavior:'smooth',block:'start'}));
    renderAll();
  </script>
</body>
</html>
