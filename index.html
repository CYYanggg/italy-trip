      {id:11,date:"4/12（日）",title:"米蘭 → 台灣",city:"Transit",area:"米蘭中央車站 → 米蘭機場",stay:["飛機上","Milan Malpensa Airport Terminal 1"],summary:"返程日，若要退稅建議提早抵達機場。",weather:{temp:"請於出發前 7–10 天更新",rain:"尚無可靠預報",sunrise:"待更新",sunset:"待更新"},mapQuery:"Milan Malpensa Airport Terminal 1",todos:["前 48 小時完成線上 check-in","整理退稅單與購物收據","確認護照與登機證在隨身包"],tips:["若有精品購物與退稅，時間不要抓太剛好。","你住 Centrale 旁邊，去機場動線很簡單。"],schedule:[{time:"早上",label:"飯店 check-out",note:"從 Ostello Bello Grande 走到 Milano Centrale 很近",map:"Ostello Bello Grande Milan",move:"步行",moveNote:"拖行李步行到中央車站"},{time:"建議 08:00 左右",label:"抵達 MXP",note:"若要退稅；11:15 第一航廈起飛",map:"Milan Malpensa Airport Terminal 1",move:"機場快線",moveNote:"從 Milano Centrale 搭 Malpensa Express 前往第一航廈"},{time:"11:15",label:"起飛返台",note:"預計 4/13 05:40 抵達台灣",map:"Milan Malpensa Airport Terminal 1",move:"步行",moveNote:"依航廈指標前往登機門"}]}
    ];

    const cityOptions = ["All","佛羅倫斯","西恩那","威尼斯","米蘭","科莫湖","Transit"];
    const cityColor = {佛羅倫斯:"#F5DDD0",西恩那:"#F7ECC8",威尼斯:"#C8E4F5",米蘭:"#EAE8F0",科莫湖:"#C8ECDC",Transit:"#EDE5F5"};
    let selectedCity = "All", openDay = 2, compactMode = false;
    const cityChipsEl = document.getElementById('cityChips');
    const dayListEl = document.getElementById('dayList');
    const dayCardEl = document.getElementById('dayCard');
    const modeBtn = document.getElementById('modeBtn');
    const topBtn = document.getElementById('topBtn');

    const getFilteredDays = () => selectedCity === 'All' ? tripDays : tripDays.filter(d => d.city === selectedCity);
    const getCurrentDay = () => { const filtered = getFilteredDays(); return filtered.find(d => d.id === openDay) || filtered[0] || tripDays[0]; };
    const areaFlow = (area) => { const parts = area.split('→').map(s => s.trim()).filter(Boolean); return `<div class="area-flow">${parts.map((part,i)=>`<div class="area-node">${part}</div>${i<parts.length-1?'<div class="arrow">→</div>':''}`).join('')}</div>`; };
    const foodCard = (item) => `<a class="food-card" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.map||item.name)}" target="_blank" rel="noreferrer"><div class="item-name">${item.name}</div><div class="food-note"><strong>推薦品項：</strong>${item.recommend||'店內招牌'}</div><div class="food-note"><strong>價位：</strong>${item.price||'€€'}</div><div class="tag" data-tag="${item.type||'店家'}">${item.type||'店家'}</div></a>`;
    const simpleLinkCard = (title,map) => `<a class="link-card" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(map)}" target="_blank" rel="noreferrer"><div class="item-name">${title}</div><div class="tag">點此導航</div></a>`;
    const markDone = (id) => { const done = JSON.parse(localStorage.getItem('trip_done') || '{}'); done[id] = !done[id]; localStorage.setItem('trip_done', JSON.stringify(done)); renderAll(); };
    const isDone = (id) => { const done = JSON.parse(localStorage.getItem('trip_done') || '{}'); return !!done[id]; };
    const getBudget = (dayId) => { try { return JSON.parse(localStorage.getItem(`trip_budget_${dayId}`) || '{}'); } catch(e){ return {}; } };
    const saveBudget = (dayId) => { const payload = { food: document.getElementById('budget_food')?.value || '', transport: document.getElementById('budget_transport')?.value || '', snacks: document.getElementById('budget_snacks')?.value || '' }; localStorage.setItem(`trip_budget_${dayId}`, JSON.stringify(payload)); renderAll(); };
    
    // 取得心得與儲存心得的函數
    const getDiary = (dayId) => localStorage.getItem(`trip_diary_${dayId}`) || '';
    const saveDiary = (dayId) => {
      const text = document.getElementById('diary_text')?.value || '';
      localStorage.setItem(`trip_diary_${dayId}`, text);
      alert('心得已儲存！');
    };

    // === 景點排序、刪除、移動 ===
    const getEffectiveSchedule = (day) => {
      try { const s = localStorage.getItem(`trip_schedule_${day.id}`); if (s !== null) return JSON.parse(s); } catch(e) {}
      return day.schedule.map(item => Object.assign({}, item));
    };
    const saveSchedule = (dayId, schedule) => localStorage.setItem(`trip_schedule_${dayId}`, JSON.stringify(schedule));
    const moveItemUp = (dayId, index) => {
      const day = tripDays.find(d => d.id === dayId);
      const sch = getEffectiveSchedule(day);
      if (index <= 0) return;
      [sch[index-1], sch[index]] = [sch[index], sch[index-1]];
      saveSchedule(dayId, sch); renderAll();
    };
    const moveItemDown = (dayId, index) => {
      const day = tripDays.find(d => d.id === dayId);
      const sch = getEffectiveSchedule(day);
      if (index >= sch.length - 1) return;
      [sch[index], sch[index+1]] = [sch[index+1], sch[index]];
      saveSchedule(dayId, sch); renderAll();
    };
    const deleteScheduleItem = (dayId, index) => {
      if (!confirm('確定刪除此景點？')) return;
      const day = tripDays.find(d => d.id === dayId);
      const sch = getEffectiveSchedule(day);
      sch.splice(index, 1);
      saveSchedule(dayId, sch); renderAll();
    };
    const toggleMovePanel = (panelId) => {
      const el = document.getElementById(panelId);
      if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
    };
    const moveItemToDay = (fromDayId, index, toDayId) => {
      const fromDay = tripDays.find(d => d.id === fromDayId);
      const toDay = tripDays.find(d => d.id === toDayId);
      const fromSch = getEffectiveSchedule(fromDay);
      const toSch = getEffectiveSchedule(toDay);
      const [item] = fromSch.splice(index, 1);
      toSch.push(item);
      saveSchedule(fromDayId, fromSch);
      saveSchedule(toDayId, toSch);
      openDay = toDayId;
      renderAll();
    };


    // === 照片上傳 ===
    const getPhotos = (dayId) => { try { return JSON.parse(localStorage.getItem(`trip_photos_${dayId}`) || '[]'); } catch(e) { return []; } };
    const savePhotos = (dayId, photos) => localStorage.setItem(`trip_photos_${dayId}`, JSON.stringify(photos));
    const deletePhoto = (dayId, index) => { const p = getPhotos(dayId); p.splice(index,1); savePhotos(dayId,p); renderAll(); };
    const addPhotos = (dayId, files) => {
      const photos = getPhotos(dayId);
      const slots = 12 - photos.length;
      if (slots <= 0) { alert('最多儲存 12 張照片'); return; }
      const list = Array.from(files).slice(0, slots);
      let done = 0;
      list.forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const max = 900; let w = img.width, h = img.height;
            if (w > max || h > max) { if (w > h) { h = Math.round(h*max/w); w = max; } else { w = Math.round(w*max/h); h = max; } }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            photos.push(canvas.toDataURL('image/jpeg', 0.72));
            if (++done === list.length) { savePhotos(dayId, photos); renderAll(); }
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    };

    const buildDayMapUrl = (day) => { const points = getEffectiveSchedule(day).map(s => s.map || s.label).filter(Boolean); if (!points.length) return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(day.mapQuery)}`; const destination = points[points.length - 1]; const waypoints = points.slice(0, -1).join('|'); return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(destination)}&waypoints=${encodeURIComponent(waypoints)}&travelmode=walking`; };

    async function fetchWeather() {
      try {
        const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=45.46&longitude=9.19&current_weather=true');
        const data = await res.json();
        const temp = data?.current_weather?.temperature;
        if (typeof temp === 'number') document.querySelectorAll('.weather-temp').forEach(el => el.textContent = `${temp}°C`);
      } catch (e) {}
    }

    function renderChips() {
      cityChipsEl.innerHTML = cityOptions.map(city => `<button class="chip ${selectedCity===city?'active':''}" data-city="${city}">${city==='All'?'全部':city}</button>`).join('');
      cityChipsEl.querySelectorAll('.chip').forEach(btn => btn.addEventListener('click', () => {
        selectedCity = btn.dataset.city;
        const filtered = getFilteredDays();
        if (!filtered.some(d => d.id === openDay)) openDay = filtered[0]?.id || 1;
        renderAll();
      }));
    }

    function renderDayList() {
      const filtered = getFilteredDays();
      dayListEl.innerHTML = filtered.map(day => `<button class="day-btn ${day.id===openDay?'active':''}" data-id="${day.id}"><div class="day-date">${day.date}</div><div class="day-title">${day.title}</div><div class="day-area">${day.area}</div></button>`).join('');
      dayListEl.querySelectorAll('.day-btn').forEach(btn => btn.addEventListener('click', () => {
        openDay = Number(btn.dataset.id);
        renderAll();
        setTimeout(() => document.getElementById('todaySchedule')?.scrollIntoView({ behavior:'smooth', block:'start' }), 60);
      }));
    }

    function renderDayCard() {
      const day = getCurrentDay();
      const cityFood = cityRestaurants[day.city] || [];
      const effectiveSchedule = getEffectiveSchedule(day);
      const totalItems = effectiveSchedule.length;
      const visibleItems = (compactMode ? effectiveSchedule.map((item,i)=>({item,i})).filter(({item},idx)=>idx<5||String(item.time).includes(':')) : effectiveSchedule.map((item,i)=>({item,i})));
      const foodList = cityFood.filter(x => !["Gelato","咖啡","烘焙","甜點"].includes(x[1])).slice(0,14).map(([name,type,map,recommend,price])=>({name,type,map,recommend,price}));
      const dessertList = cityFood.filter(x => ["Gelato","咖啡","烘焙","甜點"].includes(x[1])).slice(0,12).map(([name,type,map,recommend,price])=>({name,type,map,recommend,price}));
      const restrooms = cityRestrooms[day.city] || cityRestrooms.Transit || [];
      const supermarkets = citySupermarkets[day.city] || citySupermarkets.Transit || [];
      const budget = getBudget(day.id);
      const diaryText = getDiary(day.id);
      const total = (Number(budget.food || 0) + Number(budget.transport || 0) + Number(budget.snacks || 0)) || 0;

      dayCardEl.innerHTML = `
        <div class="day-head">
          <div class="eyebrow">${day.date}</div>
          <h3>${day.title}</h3>
          <div class="summary">${day.summary}</div>
          <div class="badges"><span class="badge" style="background:${cityColor[day.city] || '#fafaf9'}">${day.city}</span><span class="badge">${day.area}</span></div>
        </div>
        <div class="content-grid">
          <div>
            <div class="section-title">今日行程</div>
            <div class="stack" id="todaySchedule">
              ${visibleItems.map(({item,i})=>{ const key = `${day.id}_${i}`; const mpId = `mvp_${day.id}_${i}`; return `<div class="item"><div class="item-top"><div class="item-name"><input type="checkbox" ${isDone(key)?'checked':''} onchange="markDone('${key}')" style="margin-right:6px">${item.label}</div><div style="display:flex;align-items:center;flex-shrink:0"><span class="item-time" style="margin-right:4px">${item.time||''}</span><div class="edit-controls"><button class="ctrl-btn" onclick="moveItemUp(${day.id},${i})" title="上移"${i===0?' disabled':''}>↑</button><button class="ctrl-btn" onclick="moveItemDown(${day.id},${i})" title="下移"${i===totalItems-1?' disabled':''}>↓</button><button class="ctrl-btn" onclick="deleteScheduleItem(${day.id},${i})" title="刪除" style="color:#dc2626">✕</button><button class="ctrl-btn" onclick="toggleMovePanel('${mpId}')" title="移至其他天">移</button></div></div></div><div id="${mpId}" class="move-panel"><div style="font-size:13px;font-weight:700;margin-bottom:6px;color:#44403c">移至哪一天？</div><div style="display:flex;flex-wrap:wrap;gap:6px">${tripDays.filter(d=>d.id!==day.id).map(d=>`<button class="chip" style="padding:6px 10px;font-size:12px" onclick="moveItemToDay(${day.id},${i},${d.id})">${d.date} ${d.title}</button>`).join('')}</div></div><div class="item-note">${item.note||''}</div><div class="mini"><strong>建議移動方式：</strong>${item.move||'步行'}｜${item.moveNote||''}</div><a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.map||item.label)}" target="_blank" class="tag">點此導航</a></div>`; }).join('')}
            </div>
            ${day.museumNotes?.length ? `<div style="margin-top:16px"><div class="section-title">展間 / 觀賞重點</div><div class="stack">${day.museumNotes.map(box => `<div class="museum-box"><div class="item-name">${box.title}</div><ul>${box.items.map(i => `<li>${i}</li>`).join('')}</ul></div>`).join('')}</div></div>` : ''}
            ${day.transport?.length ? `<div style="margin-top:16px"><div class="section-title">交通重點</div><div class="stack">${day.transport.map(t => `<div class="note-box blue">${t}</div>`).join('')}</div></div>` : ''}
            ${day.todos?.length ? `<div style="margin-top:16px"><div class="section-title">待辦提醒</div><div class="stack">${day.todos.map(t => `<div class="note-box amber">${t}</div>`).join('')}</div></div>` : ''}
            <div style="margin-top:16px"><div class="section-title">住宿</div>${simpleLinkCard(day.stay?.[0] || '住宿', day.stay?.[1] || day.mapQuery)}</div>
            <div style="margin-top:16px"><div class="section-title">今日地圖</div><div class="map-actions"><a class="primary-btn" href="${buildDayMapUrl(day)}" target="_blank" rel="noreferrer">查看今日地圖</a></div></div>
            <div style="margin-top:16px"><div class="section-title">主要活動區域</div><div class="link-card">${areaFlow(day.area)}</div></div>
            <div style="margin-top:16px"><div class="section-title">天氣 / 日出日落</div><div class="grid2"><div class="weather-card"><div class="label">目前氣溫</div><div class="value weather-temp">${day.weather.temp}</div></div><div class="weather-card"><div class="label">降雨</div><div class="value">${day.weather.rain}</div></div><div class="weather-card"><div class="label">日出</div><div class="value">${day.weather.sunrise}</div></div><div class="weather-card"><div class="label">日落</div><div class="value">${day.weather.sunset}</div></div></div><div class="mini">精準預報接近出發前再補最準。</div></div>
            <div style="margin-top:16px"><div class="section-title">今日預算</div><div class="budget-card"><div class="budget-row"><input id="budget_food" class="budget-input" type="number" inputmode="decimal" placeholder="餐費 €" value="${budget.food||''}"><input id="budget_transport" class="budget-input" type="number" inputmode="decimal" placeholder="交通 €" value="${budget.transport||''}"></div><div class="budget-row"><input id="budget_snacks" class="budget-input" type="number" inputmode="decimal" placeholder="甜點 / 咖啡 €" value="${budget.snacks||''}"><button class="primary-btn" onclick="saveBudget(${day.id})">儲存預算</button></div><div class="value" style="margin-top:10px">今日合計：€ ${total}</div></div></div>
            
            <div style="margin-top:16px">
              <div class="section-title">今日心得</div>
              <div class="budget-card">
                <textarea id="diary_text" style="width:100%; border:1px solid var(--line); border-radius:12px; padding:10px 12px; font-size:14px; background:var(--card); font-family:inherit; resize:vertical; min-height:100px; color:var(--text)" placeholder="記錄今天的風景、趣事或心情...">${diaryText}</textarea>
                <button class="primary-btn" style="margin-top:8px; width:100%" onclick="saveDiary(${day.id})">儲存心得</button>
              </div>
            </div>

            <div style="margin-top:16px">
              <div class="section-title">今日照片</div>
              <div class="budget-card">
                ${(()=>{ const photos=getPhotos(day.id); return `${photos.length?`<div class="photo-grid">${photos.map((src,idx)=>`<div class="photo-thumb"><img src="${src}" alt="照片 ${idx+1}"><button class="photo-del" onclick="deletePhoto(${day.id},${idx})" title="刪除">✕</button></div>`).join('')}</div>`:''}<label class="photo-upload-label"><input type="file" accept="image/*" multiple style="display:none" onchange="addPhotos(${day.id},this.files)">＋ 上傳照片${photos.length?` (${photos.length}/12)`:''}</label>`; })()}
              </div>
            </div>

          </div>
          <div>
            <div class="section-title">附近可吃的餐廳</div>
            <div class="chips" id="foodTabs" style="margin-bottom:10px"><button class="chip active" data-type="all">全部</button><button class="chip" data-type="餐廳">正餐</button><button class="chip" data-type="Pizza">Pizza</button><button class="chip" data-type="小吃">小吃</button><button class="chip" data-type="Gelato">Gelato</button><button class="chip" data-type="咖啡">咖啡</button><button class="chip" data-type="甜點">甜點</button></div>
            <div class="stack" id="foodContainer">${[...foodList,...dessertList].map(foodCard).join('')}</div>
            <div style="margin-top:16px"><div class="section-title">廁所據點</div><div class="stack">${restrooms.map(([name,map]) => simpleLinkCard(name,map)).join('')}</div></div>
            <div style="margin-top:16px"><div class="section-title">超市</div><div class="stack">${supermarkets.map(([name,map]) => simpleLinkCard(name,map)).join('')}</div></div>
            <div style="margin-top:16px"><div class="section-title">小提醒</div><div class="stack">${day.tips.map(t => `<div class="note-box green">${t}</div>`).join('')}</div></div>
          </div>
        </div>`;

      const tabs = document.querySelectorAll('#foodTabs .chip');
      const cards = document.querySelectorAll('#foodContainer .food-card');
      tabs.forEach(tab => tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const type = tab.dataset.type;
        cards.forEach(card => {
          if (type === 'all') { card.style.display = 'block'; return; }
          const tagEl = card.querySelector('.tag');
          const cardType = tagEl ? tagEl.dataset.tag : '';
          card.style.display = cardType === type ? 'block' : 'none';
        });
      }));
    }

    function renderAll() {
      renderChips();
      renderDayList();
      renderDayCard();
      modeBtn.textContent = compactMode ? '目前：精簡模式' : '目前：完整模式';
      modeBtn.classList.toggle('active', compactMode);
      fetchWeather();
    }

    modeBtn.addEventListener('click', () => { compactMode = !compactMode; renderAll(); });
    window.addEventListener('scroll', () => { topBtn.classList.toggle('show', window.scrollY > 300); });
    topBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    renderAll();
  </script>
</body>
</html>
