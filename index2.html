<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>北義探險去</title>
  <style>
    :root {
      --bg:#f5f5f4; --card:#fff; --text:#1c1917; --muted:#57534e; --line:#e7e5e4;
      --primary:#111827; --soft:#fafaf9; --danger:#b91c1c; --ok:#065f46;
      --shadow:0 10px 28px rgba(28,25,23,.06);
    }
    *{box-sizing:border-box} html{scroll-behavior:smooth}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
    a{color:inherit;text-decoration:none}
    .wrap{max-width:1180px;margin:0 auto;padding:18px 14px 42px}
    .hero,.panel,.day-card{background:var(--card);border-radius:28px;box-shadow:var(--shadow)}
    .hero{padding:22px 20px;margin-bottom:14px}
    .eyebrow{font-size:12px;color:#78716c;margin-bottom:8px}
    h1{margin:0;font-size:clamp(28px,4vw,40px);line-height:1.15}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
    .stat{background:var(--soft);border-radius:18px;padding:12px}
    .stat .k{font-size:12px;color:#78716c}.stat .v{margin-top:4px;font-size:13px;font-weight:700}
    .toolbar{display:flex;flex-direction:column;gap:12px;padding:14px;margin-bottom:14px}
    .toolbar-title{font-size:13px;font-weight:700;color:#44403c;margin-bottom:8px}
    .chips{display:flex;flex-wrap:wrap;gap:8px}
    .chip,.mode-btn,.primary-btn,.ghost-btn,.small-btn,.danger-btn{border:1px solid var(--line);background:#fff;color:#44403c;border-radius:999px;padding:9px 14px;font-size:14px;cursor:pointer}
    .chip.active,.mode-btn.active,.primary-btn{background:var(--primary);color:#fff;border-color:var(--primary)}
    .ghost-btn{background:var(--soft)} .small-btn{padding:6px 10px;font-size:12px;border-radius:12px}
    .danger-btn{background:#fff7f7;color:var(--danger);border-color:#fecaca}
    .layout{display:grid;grid-template-columns:1fr;gap:14px}
    .sidebar{display:grid;gap:14px}.panel{padding:16px}.panel h2{margin:0 0 12px;font-size:18px}
    .day-list{display:grid;gap:10px}
    .day-btn{width:100%;text-align:left;border:1px solid var(--line);background:#fff;border-radius:20px;padding:14px;cursor:pointer}
    .day-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .day-date{font-size:12px;opacity:.75}.day-title{margin-top:4px;font-weight:700}.day-area{margin-top:6px;font-size:14px;color:#57534e}.day-btn.active .day-area{color:#e7e5e4}
    .day-card{padding:18px}.day-head{border-bottom:1px solid var(--line);padding-bottom:14px}
    .day-head h3{margin:4px 0 0;font-size:clamp(24px,3vw,34px);line-height:1.2}
    .summary{margin-top:10px;color:var(--muted);font-size:15px}
    .badges{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    .badge{padding:8px 12px;border-radius:999px;font-size:13px;border:1px solid var(--line);background:var(--soft)}
    .content-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-top:18px}
    .section-title{font-weight:800;font-size:14px;margin-bottom:10px;color:#44403c}
    .stack{display:grid;gap:10px}
    .food-card,.link-card,.transport-card{border:1px solid var(--line);border-radius:18px;padding:13px;background:#fff;display:block}
    .food-card:hover,.link-card:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
    .item-top{display:flex;justify-content:space-between;gap:10px;align-items:start}
    .item-name{font-weight:700}.item-time{font-size:13px;color:#78716c;white-space:nowrap}
    .item-note,.food-note{margin-top:4px;font-size:14px;color:var(--muted)} .mini{margin-top:6px;font-size:13px;color:#78716c}
    .tag{display:inline-block;margin-top:8px;background:var(--soft);color:#57534e;font-size:12px;padding:5px 9px;border-radius:999px}
    .museum-box{border:1px dashed #d6d3d1;background:#fffefc;border-radius:18px;padding:14px}.museum-box ul{margin:8px 0 0 18px;padding:0}.museum-box li{margin-bottom:6px;color:var(--muted);font-size:14px}
    .area-flow{display:flex;flex-wrap:wrap;align-items:center;gap:8px}.area-node{padding:10px 12px;border-radius:14px;background:var(--soft);border:1px solid var(--line);font-size:13px}.arrow{color:#a8a29e;font-weight:700}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.weather-card,.budget-card,.progress-card{background:var(--soft);border:1px solid var(--line);border-radius:18px;padding:12px}
    .weather-card .label,.budget-card .label,.progress-card .label{font-size:12px;color:#78716c}.weather-card .value,.budget-card .value,.progress-card .value{margin-top:4px;font-size:13px;font-weight:700}
    .budget-row{display:grid;grid-template-columns:1fr 110px;gap:8px;margin-top:8px}.budget-input{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:14px;background:#fff}
    .map-actions{display:flex;flex-wrap:wrap;gap:8px}.floating-top{position:fixed;right:16px;bottom:18px;width:48px;height:48px;border-radius:999px;border:none;background:var(--primary);color:#fff;box-shadow:var(--shadow);font-size:20px;cursor:pointer;display:none;z-index:50}
    .floating-top.show{display:block}.floating-today{position:fixed;right:16px;bottom:76px;border:none;background:#fff;color:var(--primary);box-shadow:var(--shadow);border-radius:999px;padding:10px 14px;font-weight:700;display:none;z-index:50}.floating-today.show{display:block}
    .progress-bar{height:10px;background:#e7e5e4;border-radius:999px;overflow:hidden;margin-top:8px}.progress-fill{height:100%;background:var(--ok);border-radius:999px}
    .item-shell{position:relative;overflow:hidden;border-radius:18px}
    .delete-lane{position:absolute;right:0;top:0;bottom:0;width:88px;background:var(--danger);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700}
    .swipe-card{position:relative;background:#fff;border:1px solid var(--line);border-radius:18px;padding:13px;touch-action:pan-y;transition:transform .2s ease, box-shadow .2s ease}
    .swipe-card.open{transform:translateX(-88px)} .swipe-card.dragging{opacity:.5;box-shadow:0 12px 24px rgba(0,0,0,.08)} .swipe-card.done{opacity:.72}
    .swipe-card.done .item-name{text-decoration:line-through;color:#78716c}
    .drag-handle{cursor:grab;user-select:none;padding:0 6px;color:#78716c;font-weight:700}.drag-handle:active{cursor:grabbing}
    .transport-links{display:grid;gap:10px}
    @media (min-width:960px){.hero{display:grid;grid-template-columns:1.2fr 1fr;gap:18px;align-items:end}.layout{grid-template-columns:330px minmax(0,1fr);align-items:start}.content-grid{grid-template-columns:1.02fr .98fr}.toolbar{flex-direction:row;justify-content:space-between;align-items:start}}
  </style>
</head>

  </div>

    const saveBudget=(dayId)=>{const payload={food:document.getElementById('budget_food')?.value||'',transport:document.getElementById('budget_transport')?.value||'',snacks:document.getElementById('budget_snacks')?.value||''}; localStorage.setItem(`trip_budget_final_${dayId}`, JSON.stringify(payload)); renderAll();};
    const buildDayMapUrl=(day)=>{const points=day.schedule.map(s=>s.map||s.label).filter(Boolean); if(!points.length) return `https://www.google.com/maps/search/${encodeURIComponent(day.mapQuery)}`; const destination=points[points.length-1]; const waypoints=points.slice(0,-1).join('|'); return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(destination)}&waypoints=${encodeURIComponent(waypoints)}&travelmode=walking`;};
    function moveToDay(fromDayId,index,toDayId){const from=tripDays.find(d=>d.id===fromDayId); const to=tripDays.find(d=>d.id===Number(toDayId)); if(!from||!to||from===to) return; const [item]=from.schedule.splice(index,1); to.schedule.push(item); saveTripDays(); renderAll();}
    function deleteItem(dayId,index){const day=tripDays.find(d=>d.id===dayId); if(!day) return; day.schedule.splice(index,1); saveTripDays(); renderAll();}
    function addTransitLink(dayId){const day=tripDays.find(d=>d.id===dayId); if(!day) return; day.transitLinks=day.transitLinks||[]; day.transitLinks.push({label:'新時刻表連結', url:'https://'}); saveTripDays(); renderAll();}
    function updateTransitLink(dayId, idx, field, value){const day=tripDays.find(d=>d.id===dayId); if(!day||!day.transitLinks?.[idx]) return; day.transitLinks[idx][field]=value; saveTripDays();}
    function deleteTransitLink(dayId, idx){const day=tripDays.find(d=>d.id===dayId); if(!day||!day.transitLinks) return; day.transitLinks.splice(idx,1); saveTripDays(); renderAll();}
    async function fetchWeather(){try{const res=await fetch('https://api.open-meteo.com/v1/forecast?latitude=45.46&longitude=9.19&current_weather=true'); const data=await res.json(); const temp=data?.current_weather?.temperature; if(typeof temp==='number') document.querySelectorAll('.weather-temp').forEach(el=>el.textContent=`${temp}°C`);}catch(e){}}
    function exportData(){const blob=new Blob([JSON.stringify({tripDays},null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='italy-trip.json'; a.click(); URL.revokeObjectURL(a.href);}
    function importData(file){const reader=new FileReader(); reader.onload=()=>{try{const parsed=JSON.parse(reader.result); if(Array.isArray(parsed.tripDays)){tripDays=parsed.tripDays; saveTripDays(); openDay=tripDays[0]?.id||openDay; renderAll();}}catch(e){alert('JSON 檔案格式不正確');}}; reader.readAsText(file);}
    function renderChips(){cityChipsEl.innerHTML=cityOptions.map(city=>`<button class="chip ${selectedCity===city?'active':''}" data-city="${city}">${city==='All'?'全部':city}</button>`).join(''); cityChipsEl.querySelectorAll('.chip').forEach(btn=>btn.addEventListener('click',()=>{selectedCity=btn.dataset.city; const filtered=getFilteredDays(); if(!filtered.some(d=>d.id===openDay)) openDay=filtered[0]?.id||tripDays[0].id; renderAll();}));}
    function renderDayList(){const filtered=getFilteredDays(); dayListEl.innerHTML=filtered.map(day=>`<button class="day-btn ${day.id===openDay?'active':''}" data-id="${day.id}"><div class="day-date">${day.date}</div><div class="day-title">${day.title}</div><div class="day-area">${day.area}</div></button>`).join(''); dayListEl.querySelectorAll('.day-btn').forEach(btn=>btn.addEventListener('click',()=>{openDay=Number(btn.dataset.id); renderAll(); setTimeout(()=>document.getElementById('todaySchedule')?.scrollIntoView({behavior:'smooth',block:'start'}),60);}));}
    function wireSwipeAndDrag(dayId){
      const list=document.getElementById('todaySchedule'); if(!list) return;
      let dragIndex=null;
      list.querySelectorAll('.swipe-card').forEach(card=>{
        let startX=0;
        card.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;},{passive:true});
        card.addEventListener('touchmove',e=>{const diff=e.touches[0].clientX-startX; if(diff<-35) card.classList.add('open'); if(diff>35) card.classList.remove('open');},{passive:true});
        card.addEventListener('dragstart',()=>{dragIndex=Number(card.dataset.index); card.classList.add('dragging');});
        card.addEventListener('dragend',()=>{card.classList.remove('dragging'); dragIndex=null;});
        card.addEventListener('dragover',e=>e.preventDefault());
        card.addEventListener('drop',e=>{e.preventDefault(); const targetIndex=Number(card.dataset.index); if(dragIndex===null||dragIndex===targetIndex) return; const day=tripDays.find(d=>d.id===dayId); const [moved]=day.schedule.splice(dragIndex,1); day.schedule.splice(targetIndex,0,moved); saveTripDays(); renderAll();});
      });
    }
    function getProgress(day){ const total=day.schedule.length||1; let doneCount=0; day.schedule.forEach((_,i)=>{ if(isDone(`${day.id}_${i}`)) doneCount++; }); return {doneCount,total,pct:Math.round(doneCount/total*100)}; }
    function renderDayCard(){
      const day=getCurrentDay(); const cityFood=cityRestaurants[day.city]||[]; const visibleSchedule=compactMode?day.schedule.filter((item,index)=>index<5||String(item.time).includes(':')):day.schedule; const foodList=cityFood.filter(x=>!["Gelato","咖啡","烘焙","甜點"].includes(x[1])).map(([name,type,map,recommend,price])=>({name,type,map,recommend,price})); const dessertList=cityFood.filter(x=>["Gelato","咖啡","烘焙","甜點"].includes(x[1])).map(([name,type,map,recommend,price])=>({name,type,map,recommend,price})); const restrooms=cityRestrooms[day.city]||cityRestrooms.Transit||[]; const supermarkets=citySupermarkets[day.city]||citySupermarkets.Transit||[]; const budget=getBudget(day.id); const totalBudget=(Number(budget.food||0)+Number(budget.transport||0)+Number(budget.snacks||0))||0; const progress=getProgress(day);
      dayCardEl.innerHTML=`<div class="day-head"><div class="eyebrow">${day.date}</div><h3>${day.title}</h3><div class="summary">${day.summary}</div><div class="badges"><span class="badge" style="background:${cityColor[day.city]||'#fafaf9'}">${day.city}</span><span class="badge">${day.area}</span></div></div><div class="content-grid"><div><div class="section-title">今日進度</div><div class="progress-card"><div class="label">已完成 ${progress.doneCount} / ${progress.total}</div><div class="value">${progress.pct}%</div><div class="progress-bar"><div class="progress-fill" style="width:${progress.pct}%"></div></div></div><div style="margin-top:16px" class="section-title">今日行程</div><div class="stack" id="todaySchedule">${visibleSchedule.map((item,i)=>{const key=`${day.id}_${i}`; return `<div class="item-shell"><div class="delete-lane"><button class="small-btn" style="background:transparent;color:white;border-color:rgba(255,255,255,.4)" onclick="deleteItem(${day.id},${i})">刪除</button></div><div class="swipe-card ${isDone(key)?'done':''}" draggable="true" data-index="${i}"><div class="item-top"><div class="item-name"><span class="drag-handle">☰</span><input type="checkbox" ${isDone(key)?'checked':''} onchange="markDone('${key}')" style="margin-right:6px">${item.label}</div><div class="item-time">${item.time}</div></div><div class="item-note">${item.note||''}</div><div class="mini"><strong>建議移動方式：</strong>${item.move||'步行'}｜${item.moveNote||''}</div><div class="map-actions"><a href="https://www.google.com/maps/search/${encodeURIComponent(item.map||item.label)}" target="_blank" class="tag">點此導航</a><select onchange="moveToDay(${day.id},${i}, this.value)"><option value="">移到其它天</option>${tripDays.filter(d=>d.id!==day.id).map(d=>`<option value="${d.id}">${d.date} ${d.title}</option>`).join('')}</select></div></div></div>`;}).join('')}</div>${day.museumNotes?.length?`<div style="margin-top:16px"><div class="section-title">展間 / 觀賞重點</div><div class="stack">${day.museumNotes.map(box=>`<div class="museum-box"><div class="item-name">${box.title}</div><ul>${box.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`).join('')}</div></div>`:''}<div style="margin-top:16px"><div class="section-title">住宿</div>${simpleLinkCard(day.stay?.[0]||'住宿',day.stay?.[1]||day.mapQuery)}</div><div style="margin-top:16px"><div class="section-title">今日導航</div><div class="map-actions"><a class="primary-btn" href="${buildDayMapUrl(day)}" target="_blank" rel="noreferrer">🗺 今日導航</a></div></div><div style="margin-top:16px"><div class="section-title">主要活動區域</div><div class="link-card">${areaFlow(day.area)}</div></div><div style="margin-top:16px"><div class="section-title">天氣 / 日出日落</div><div class="grid2"><div class="weather-card"><div class="label">目前氣溫</div><div class="value weather-temp">${day.weather.temp}</div></div><div class="weather-card"><div class="label">降雨</div><div class="value">${day.weather.rain}</div></div><div class="weather-card"><div class="label">日出</div><div class="value">${day.weather.sunrise}</div></div><div class="weather-card"><div class="label">日落</div><div class="value">${day.weather.sunset}</div></div></div></div><div style="margin-top:16px"><div class="section-title">今日預算</div><div class="budget-card"><div class="budget-row"><input id="budget_food" class="budget-input" type="number" inputmode="decimal" placeholder="餐費 €" value="${budget.food||''}"><input id="budget_transport" class="budget-input" type="number" inputmode="decimal" placeholder="交通 €" value="${budget.transport||''}"></div><div class="budget-row"><input id="budget_snacks" class="budget-input" type="number" inputmode="decimal" placeholder="甜點 / 咖啡 €" value="${budget.snacks||''}"><button class="primary-btn" onclick="saveBudget(${day.id})">儲存預算</button></div><div class="value" style="margin-top:10px">今日合計：€ ${totalBudget}</div></div></div><div style="margin-top:16px"><div class="section-title">大眾運輸時刻表外部連結</div><div class="transport-links">${(day.transitLinks||[]).map((t,idx)=>`<div class="transport-card"><div class="item-top"><div class="item-name">${t.label}</div><a class="tag" href="${t.url||'#'}" target="_blank" rel="noreferrer">前往查詢</a></div><div class="budget-row" style="grid-template-columns:1fr 90px"><input class="budget-input" value="${t.label||''}" placeholder="連結名稱" oninput="updateTransitLink(${day.id},${idx},'label',this.value)"><button class="small-btn" onclick="deleteTransitLink(${day.id},${idx})">刪除</button></div><div style="margin-top:8px"><input class="budget-input" value="${t.url||''}" placeholder="外部連結" oninput="updateTransitLink(${day.id},${idx},'url',this.value)"></div></div>`).join('')}</div><div style="margin-top:10px"><button class="ghost-btn" onclick="addTransitLink(${day.id})">新增時刻表連結</button></div></div></div><div><div class="section-title">附近可吃的餐廳</div><div class="chips" id="foodTabs" style="margin-bottom:10px"><button class="chip active" data-type="all">全部</button><button class="chip" data-type="餐廳">正餐</button><button class="chip" data-type="Pizza">Pizza</button><button class="chip" data-type="小吃">小吃</button><button class="chip" data-type="Gelato">Gelato</button><button class="chip" data-type="咖啡">咖啡</button><button class="chip" data-type="甜點">甜點</button></div><div class="stack" id="foodContainer">${[...foodList,...dessertList].map(foodCard).join('')}</div><div style="margin-top:16px"><div class="section-title">廁所據點</div><div class="stack">${restrooms.map(([name,map])=>simpleLinkCard(name,map)).join('')}</div></div><div style="margin-top:16px"><div class="section-title">超市</div><div class="stack">${supermarkets.map(([name,map])=>simpleLinkCard(name,map)).join('')}</div></div><div style="margin-top:16px"><div class="section-title">小提醒</div><div class="stack">${(day.tips||[]).map(t=>`<div class="link-card">${t}</div>`).join('')}</div></div></div></div>`;
      const tabs=document.querySelectorAll('#foodTabs .chip'); const cards=document.querySelectorAll('#foodContainer .food-card'); tabs.forEach(tab=>tab.addEventListener('click',()=>{tabs.forEach(t=>t.classList.remove('active')); tab.classList.add('active'); const type=tab.dataset.type; cards.forEach(card=>{if(type==='all'){card.style.display='block'; return;} card.style.display=card.textContent.includes(type)?'block':'none';});}));
      wireSwipeAndDrag(day.id);
    }
    function renderAll(){renderChips(); renderDayList(); renderDayCard(); modeBtn.textContent=compactMode?'目前：精簡模式':'目前：完整模式'; modeBtn.classList.toggle('active', compactMode); fetchWeather();}
    modeBtn.addEventListener('click',()=>{compactMode=!compactMode; renderAll();});
    document.getElementById('exportBtn').addEventListener('click', exportData);
    document.getElementById('importInput').addEventListener('change', e=>{const file=e.target.files?.[0]; if(file) importData(file); e.target.value='';});
    window.addEventListener('scroll',()=>{topBtn.classList.toggle('show', window.scrollY>300); todayBtn.classList.toggle('show', window.scrollY>300);});
    topBtn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
    todayBtn.addEventListener('click',()=>document.getElementById('todaySchedule')?.scrollIntoView({behavior:'smooth',block:'start'}));
    renderAll();
  </script>
</body>
</html>
